<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkatsukiBot - 購入者ポータル</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #0c0d12;
            --surface-color: #161821;
            --accent-color: #7149e6;
            --text-primary: #ffffff;
            --text-secondary: #a0a3bd;
            --success-color: #00d28a;
            --warning-color: #f7b731;
            --danger-color: #eb4d4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #fff 0%, #a0a3bd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface-color);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 24px;
            transition: transform 0.2s;
        }

        .license-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .server-info h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .server-id {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: monospace;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-pro { background: rgba(113, 73, 230, 0.2); color: #9b7bff; border: 1px solid rgba(113, 73, 230, 0.4); }
        .badge-plus { background: rgba(235, 77, 75, 0.2); color: #ff7675; border: 1px solid rgba(235, 77, 75, 0.4); }
        .badge-free { background: rgba(160, 163, 189, 0.15); color: var(--text-secondary); border: 1px solid rgba(160, 163, 189, 0.3); }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .detail-item span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .detail-item p {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-primary:hover { filter: brightness(1.2); }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-active { color: var(--success-color); }
        .status-paused { color: var(--warning-color); }

        .login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .login-screen i { font-size: 4rem; color: var(--accent-color); margin-bottom: 20px; }

        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--text-secondary);
        }

        .paused-alert {
            background: rgba(247, 183, 49, 0.1);
            border: 1px solid rgba(247, 183, 49, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--warning-color);
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .container { margin: 20px auto; }
            header { flex-direction: column; gap: 20px; align-items: flex-start; }
            .details-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div id="loader" class="loading">
        <div class="spinner"></div>
    </div>

    <div id="login-container" style="display: none;">
        <div class="login-screen">
            <i class="bi bi-shield-lock-fill"></i>
            <h1>AkatsukiBot Portal</h1>
            <p style="color: var(--text-secondary); margin: 10px 0 30px;">自分のライセンスを管理するためにログインしてください。</p>
            <button class="btn btn-primary" onclick="window.location.href='/api/auth/login?redirect=portal'">
                <i class="bi bi-discord"></i> Discordでログイン
            </button>
        </div>
    </div>

    <div id="portal-container" style="display: none;" class="container">
        <header>
            <h1>Akatsuki Portal</h1>
            <div class="user-profile">
                <img id="user-avatar" src="" alt="">
                <span id="user-name">Loading...</span>
                <button class="btn btn-outline" style="padding: 4px 10px; font-size: 0.75rem;" onclick="logout()">ログアウト</button>
            </div>
        </header>

        <section id="licenses-list">
            <!-- Licenses will be injected here -->
        </section>

        <div id="empty-state" style="display: none;">
            <i class="bi bi-inbox" style="font-size: 3rem; display: block; margin-bottom: 10px;"></i>
            <p>有効なライセンスが見つかりませんでした。</p>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function init() {
            try {
                const res = await fetch('/api/portal/me');
                const data = await res.json();
                
                document.getElementById('loader').style.display = 'none';

                if (data.authenticated) {
                    currentUser = data.user;
                    showPortal();
                    loadLicenses();
                } else {
                    showLogin();
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerText = 'Error loading portal.';
            }
        }

        function showLogin() {
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('portal-container').style.display = 'none';
        }

        function showPortal() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('portal-container').style.display = 'block';
            document.getElementById('user-name').innerText = currentUser.username;
            if (currentUser.avatar) {
                document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${currentUser.userId}/${currentUser.avatar}.png`;
            } else {
                document.getElementById('user-avatar').src = 'https://cdn.discordapp.com/embed/avatars/0.png';
            }
        }

        async function loadLicenses() {
            const list = document.getElementById('licenses-list');
            list.innerHTML = '<p style="text-align: center;">ライセンスを取得中...</p>';
            
            try {
                const res = await fetch('/api/portal/licenses');
                const licenses = await res.json();
                
                if (licenses.length === 0) {
                    list.innerHTML = '';
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }

                document.getElementById('empty-state').style.display = 'none';
                list.innerHTML = licenses.map(sub => renderLicense(sub)).join('');
            } catch (err) {
                list.innerHTML = '<p style="color: red;">ライセンスの取得に失敗しました。</p>';
            }
        }

        function renderLicense(sub) {
            const isPaused = sub.paused_at !== null;
            const statusClass = isPaused ? 'status-paused' : 'status-active';
            const statusText = isPaused ? '一時停止中 (Free降格)' : '有効';
            const badgeClass = isPaused ? 'badge-free' : (sub.tier.includes('Pro+') ? 'badge-plus' : 'badge-pro');
            const tierName = isPaused ? 'Free' : sub.tier;
            const originalTier = isPaused ? sub.paused_tier : sub.tier;

            const expiryDate = sub.expiry_date ? new Date(sub.expiry_date).toLocaleDateString() : '無期限';

            return `
                <div class="card">
                    <div class="license-header">
                        <div class="server-info">
                            <h3>${sub.cached_servername || '不明なサーバー'}</h3>
                            <span class="server-id">ID: ${sub.guild_id}</span>
                        </div>
                        <span class="badge ${badgeClass}">${tierName}</span>
                    </div>

                    ${isPaused ? `<div class="paused-alert">
                        <i class="bi bi-info-circle"></i> 一時停止中はFreeプランの機能のみ利用可能です。再開すると停止期間分、期限が自動延長されます。
                    </div>` : ''}

                    <div class="details-grid">
                        <div class="detail-item">
                            <span>ステータス</span>
                            <p class="status-tag ${statusClass}">
                                <span style="font-size: 1.1rem; vertical-align: middle;">${isPaused ? '⏸️' : '✅'}</span>
                                ${statusText}
                            </p>
                        </div>
                        <div class="detail-item">
                            <span>有効期限</span>
                            <p>${expiryDate}</p>
                        </div>
                        <div class="detail-item">
                            <span>契約プラン</span>
                            <p>${originalTier}</p>
                        </div>
                    </div>

                    <div class="actions">
                        ${isPaused ? 
                            `<button class="btn btn-primary" onclick="toggleLicense('${sub.guild_id}', 'resume')">
                                <span style="font-size: 1rem;">▶️</span> 再開する
                            </button>` : 
                            `<button class="btn btn-outline" onclick="toggleLicense('${sub.guild_id}', 'pause')">
                                <span style="font-size: 1rem;">⏸️</span> 一時停止する
                            </button>`
                        }
                    </div>
                </div>
            `;
}

        async function toggleLicense(guildId, action) {
            const confirmed = confirm(action === 'pause' ? 
                'ライセンスを一時停止しますか？停止中は機能が制限されますが、再開時に期限が延長されます。' : 
                'ライセンスを再開しますか？本来のプラン機能が復元されます。');
            
            if (!confirmed) return;

            try {
                const res = await fetch(`/api/portal/licenses/${guildId}/toggle`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': getCookie('csrf_token')
                    },
                    body: JSON.stringify({ action })
                });
                
                const data = await res.json();
                if (data.success) {
                    loadLicenses();
                } else {
                    alert('エラー: ' + (data.error || '不明なエラーが発生しました。'));
                }
            } catch (err) {
                alert('通信エラーが発生しました。');
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.reload();
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        init();
    </script>
</body>
</html>
