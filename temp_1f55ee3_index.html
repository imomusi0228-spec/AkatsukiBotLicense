<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkatsukiBot 繝ｩ繧､繧ｻ繝ｳ繧ｹ邂｡逅・/title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; color: #f8f9fa; }
        .card { background-color: #343a40; border-color: #495057; }
        .status-active { color: #198754; font-weight: bold; }
        .status-inactive { color: #dc3545; font-weight: bold; }
        .table { color: #f8f9fa; }
        .table-hover tbody tr:hover { color: #f8f9fa; background-color: rgba(255,255,255,0.075); }
        .modal-content { background-color: #343a40; color: #f8f9fa; border-color: #495057; }
        .modal-header, .modal-footer { border-color: #495057; }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
        .form-control, .form-select { background-color: #2b3035; border-color: #495057; color: #f8f9fa; }
        .form-control:focus, .form-select:focus { background-color: #2b3035; color: #f8f9fa; border-color: #86b7fe; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>AkatsukiBot 繝ｩ繧､繧ｻ繝ｳ繧ｹ邂｡逅・/h1>
        <button class="btn btn-outline-danger" onclick="logout()">繝ｭ繧ｰ繧｢繧ｦ繝・/button>
    </div>

    <!-- Auth Section -->
    <div id="authSection" class="card p-4">
        <h3>繝ｭ繧ｰ繧､繝ｳ縺悟ｿ・ｦ√〒縺・/h3>
        <div class="input-group mb-3">
            <input type="password" id="adminToken" class="form-control" placeholder="邂｡逅・・ヨ繝ｼ繧ｯ繝ｳ">
            <button class="btn btn-primary" onclick="login()">繝ｭ繧ｰ繧､繝ｳ</button>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" style="display:none;">
        
        <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="subs-tab" data-bs-toggle="tab" data-bs-target="#subs" type="button" role="tab">繧ｵ繝悶せ繧ｯ繝ｪ繝励す繝ｧ繝ｳ</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="logs-tab" data-bs-toggle="tab" data-bs-target="#logs" type="button" role="tab">繝ｭ繧ｰ</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- Subscriptions Tab -->
            <div class="tab-pane fade show active" id="subs" role="tabpanel">
                <div class="d-flex justify-content-between mb-3">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">譁ｰ隕剰ｿｽ蜉</button>
                    <button class="btn btn-secondary" onclick="syncRoles()">繝ｭ繝ｼ繝ｫ蜷梧悄</button>
                </div>
                <div class="card p-3">
                    <table class="table table-hover table-dark">
                        <thead>
                            <tr>
                                <th>繧ｵ繝ｼ繝舌・ID</th>
                                <th>繝ｦ繝ｼ繧ｶ繝ｼID</th>
                                <th>Tier</th>
                                <th>繧ｹ繝・・繧ｿ繧ｹ</th>
                                <th>譛牙柑譛滄剞</th>
                                <th>繝｡繝｢</th>
                                <th>謫堺ｽ・/th>
                            </tr>
                        </thead>
                        <tbody id="subsTableBody">
                            <!-- Rows here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Logs Tab -->
            <div class="tab-pane fade" id="logs" role="tabpanel">
                 <button class="btn btn-sm btn-outline-secondary mb-2" onclick="fetchLogs()">繝ｭ繧ｰ譖ｴ譁ｰ</button>
                <div class="card p-3">
                    <table class="table table-sm table-dark">
                        <thead>
                            <tr>
                                <th>譌･譎・/th>
                                <th>繧ｵ繝ｼ繝舌・ID</th>
                                <th>謫堺ｽ・/th>
                                <th>隧ｳ邏ｰ</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <!-- Rows here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">繧ｵ繝悶せ繧ｯ繝ｪ繝励す繝ｧ繝ｳ霑ｽ蜉</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-2">
                    <label>繧ｵ繝ｼ繝舌・ID</label>
                    <input type="text" class="form-control" id="addServerId">
                </div>
                <div class="mb-2">
                    <label>繝ｦ繝ｼ繧ｶ繝ｼID</label>
                    <input type="text" class="form-control" id="addUserId">
                </div>
                <div class="mb-2">
                    <label>Tier</label>
                    <select class="form-select" id="addTier">
                        <option value="Pro">Pro</option>
                        <option value="Pro+">Pro+</option>
                        <option value="Free">Free</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label>譛滄俣</label>
                    <input type="text" class="form-control" id="addDuration" placeholder="30d, 1y">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="addSubscription()">菫晏ｭ・/button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">繧ｵ繝悶せ繧ｯ繝ｪ繝励す繝ｧ繝ｳ邱ｨ髮・/h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editServerId">
                
                <h6>蟒ｶ髟ｷ</h6>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="extendDuration" placeholder="30d">
                    <button class="btn btn-outline-primary" onclick="extendSub()">蟒ｶ髟ｷ</button>
                </div>

                <h6>Tier螟画峩</h6>
                <div class="input-group mb-3">
                     <select class="form-select" id="editTier">
                        <option value="Pro">Pro</option>
                        <option value="Pro+">Pro+</option>
                        <option value="Free">Free</option>
                    </select>
                    <button class="btn btn-outline-secondary" onclick="updateTier()">譖ｴ譁ｰ</button>
                </div>

                <h6>繝｡繝｢譖ｴ譁ｰ</h6>
                <div class="mb-3">
                    <textarea class="form-control" id="editNotes" rows="3"></textarea>
                    <button class="btn btn-outline-secondary mt-1 btn-sm" onclick="updateNotes()">繝｡繝｢菫晏ｭ・/button>
                </div>

                <hr>
                <button class="btn btn-danger w-100 mb-2" onclick="cancelSub()">繧ｵ繝悶せ繧ｯ繝ｪ繝励す繝ｧ繝ｳ繧ｭ繝｣繝ｳ繧ｻ繝ｫ</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = '/api';
    let token = localStorage.getItem('admin_token');

    if (token) {
        showDashboard();
    }

    function login() {
        token = document.getElementById('adminToken').value;
        if (token) {
            localStorage.setItem('admin_token', token);
            showDashboard();
        }
    }

    function logout() {
        localStorage.removeItem('admin_token');
        location.reload();
    }

    function showDashboard() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        fetchSubscriptions();
        fetchLogs();
    }

    async function apiRequest(endpoint, method = 'GET', body = null) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': token
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);

        const res = await fetch(API_URL + endpoint, options);
        if (res.status === 401) {
            alert('隱崎ｨｼ繧ｨ繝ｩ繝ｼ縲ょ・蠎ｦ繝ｭ繧ｰ繧､繝ｳ縺励※縺上□縺輔＞縲・);
            logout();
            return null;
        }
        return res.json();
    }

    async function fetchSubscriptions() {
        const data = await apiRequest('/subscriptions');
        if (!data) return;
        const tbody = document.getElementById('subsTableBody');
        tbody.innerHTML = '';
        data.forEach(sub => {
            const tr = document.createElement('tr');
            const expiry = sub.expiry_date ? new Date(sub.expiry_date).toLocaleDateString() : '辟｡譛滄剞';
            const statusClass = sub.is_active ? 'status-active' : 'status-inactive';
            const statusText = sub.is_active ? '譛牙柑' : '辟｡蜉ｹ';
            
            tr.innerHTML = `
                <td>${sub.server_id}</td>
                <td>${sub.user_id}</td>
                <td><span class="badge bg-info text-dark">${sub.plan_tier}</span></td>
                <td class="${statusClass}">${statusText}</td>
                <td>${expiry}</td>
                <td><small>${(sub.notes || '').replace(/\n/g, '<br>')}</small></td>
                <td>
                    <button class="btn btn-sm btn-outline-light" onclick="openEditModal('${sub.server_id}', '${sub.plan_tier}', '${encodeURIComponent(sub.notes || '')}')">邱ｨ髮・/button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function fetchLogs() {
        const data = await apiRequest('/logs');
        if (!data) return;
        const tbody = document.getElementById('logsTableBody');
        tbody.innerHTML = '';
        data.forEach(log => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${new Date(log.created_at).toLocaleString()}</td>
                <td>${log.server_id}</td>
                <td>${log.action}</td>
                <td>${log.details}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function addSubscription() {
        const body = {
            server_id: document.getElementById('addServerId').value,
            user_id: document.getElementById('addUserId').value,
            tier: document.getElementById('addTier').value,
            duration: document.getElementById('addDuration').value
        };
        const res = await apiRequest('/subscriptions', 'POST', body);
        if (res && res.success) {
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            fetchSubscriptions();
             // Clear inputs
            document.getElementById('addServerId').value = '';
            document.getElementById('addUserId').value = '';
            document.getElementById('addDuration').value = '';
        } else {
            alert(res.error || '螟ｱ謨励＠縺ｾ縺励◆');
        }
    }

    function openEditModal(serverId, tier, notes) {
        document.getElementById('editServerId').value = serverId;
        document.getElementById('editTier').value = tier;
        document.getElementById('editNotes').value = decodeURIComponent(notes);
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    async function extendSub() {
        const id = document.getElementById('editServerId').value;
        const duration = document.getElementById('extendDuration').value;
        const res = await apiRequest(`/subscriptions/${id}`, 'PUT', { action: 'extend', duration });
        if (res && res.success) {
            alert('蟒ｶ髟ｷ縺励∪縺励◆・・);
            fetchSubscriptions();
        } else {
            alert('螟ｱ謨励＠縺ｾ縺励◆');
        }
    }

    async function updateTier() {
        const id = document.getElementById('editServerId').value;
        const tier = document.getElementById('editTier').value;
        const res = await apiRequest(`/subscriptions/${id}`, 'PUT', { action: 'update_tier', tier });
        if (res && res.success) {
            alert('譖ｴ譁ｰ縺励∪縺励◆・・);
            fetchSubscriptions();
        }
    }

    async function updateNotes() {
        const id = document.getElementById('editServerId').value;
        const notes = document.getElementById('editNotes').value;
        const res = await apiRequest(`/subscriptions/${id}`, 'PUT', { action: 'update_note', notes });
        if (res && res.success) {
             alert('譖ｴ譁ｰ縺励∪縺励◆・・);
            fetchSubscriptions();
        }
    }

    async function cancelSub() {
        if (!confirm('譛ｬ蠖薙↓繧ｭ繝｣繝ｳ繧ｻ繝ｫ縺励∪縺吶°・・)) return;
        const id = document.getElementById('editServerId').value;
        const res = await apiRequest(`/subscriptions/${id}`, 'DELETE');
        if (res && res.success) {
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            fetchSubscriptions();
        }
    }
    
    async function syncRoles() {
        if(!confirm('繝ｭ繝ｼ繝ｫ蜷梧悄繧帝幕蟋九＠縺ｾ縺吶°・・)) return;
         const res = await apiRequest('/sync', 'POST');
         if(res) {
             alert(`蜷梧悄螳御ｺ・よ峩譁ｰ謨ｰ: ${res.updated || 0}`);
             fetchSubscriptions();
             fetchLogs();
         }
    }
</script>
</body>
</html>
